<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Sparrechner</title>
    <link rel="stylesheet" href="style.css">

    <!-- Syne (Hauptschriftart) -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Titel -->
    <header class="site-header">
        <h1>ETF <span class="highlight">Sparrechner</span></h1>
        <p class="subtitle">Mit Steuern, Kaufkraftanalyse und Entnahmeplanung.</p>
    </header>

    <!-- Zweispaltiges Layout -->
    <main class="calculator-grid">

        <div class="input-panel">

            <h2 class="panel-title">Einzahlungen</h2>

            <!-- Startkapital -->
            <div class="input-group accent-orange" data-einheit="€">
                <div class="input-label-row">
                    <label for="startkapital">Startkapital</label>
                    <span class="input-value-display" id="startkapital-display">0 €</span>
                </div>
                <div class="slider-row">
                    <input type="range" id="startkapital" min="0" max="30000" step="500" value="0"> 
                    <input type="number" id="startkapital-num" min="0" max="30000" step="500" value="0">
                </div>
            </div>

            <!-- Sparrate -->
            <div class="input-group accent-orange" data-einheit="€">
                <div class="input-label-row">
                    <label for="sparrate">Monatliche Sparrate</label>
                    <span class="input-value-display" id="sparrate-display">300 €</span>
                </div>
                <div class="slider-row">
                    <input type="range" id="sparrate" min="0" max="5000" step="50" value="300">
                    <input type="number" id="sparrate-num" min="0" max="5000" step="50" value="300">
                </div>
            </div>

            <!-- Laufzeit -->
            <div class="input-group accent-orange" data-einheit="Jahre">
                <div class="input-label-row">
                    <label for="laufzeit">Anlagezeitraum</label>
                    <span class="input-value-display" id="laufzeit-display">30 Jahre</span>
                </div>
                <div class="slider-row">
                    <input type="range" id="laufzeit" min="1" max="50" step="1" value="30">
                    <input type="number" id="laufzeit-num" min="1" max="50" step="1" value="30">
                </div>
            </div>

        </div>

        <div class="result-panel">
            
            <div class="cards-grid">

                <div class="card card-orange">
                    <span class="card-label">Endkapital Brutto</span>
                    <span class="card-value" id="endkapital-brutto"> - </span>
                    <span class="card-sub">vor Steuer, nach TER</span>
                </div>

                <div class="card card-green">
                    <span class="card-label">Endkapital Netto</span>
                    <span class="card-value" id="endkapital-netto"> - </span>
                    <span class="card-sub">nach Steuer</span>
                </div>

                <div class="card card-blue">
                    <span class="card-label">Kaufkraftbereinigt</span>
                    <span class="card-value" id="kaufkraft"> - </span>
                    <span class="card-sub">Inflation (<span id="inflationsrate-display">2.0</span>%)</span>
                </div>

                <div class="card">
                    <span class="card-label">Kapitalfaktor</span>
                    <span class="card-value" id="kapitalfaktor"> - </span>
            <span class="card-sub">× eingezahltes Kapital</span>
        </div>

            </div>


        </div>

    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Luis Robert Schulz</p>
    </footer>

     <script src="script.js"></script>
</body>
</html>
